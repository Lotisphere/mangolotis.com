<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangolotis - Indie Game Progress</title>
    <!-- Import Google Font Shippori Mincho -->
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho&display=swap" rel="stylesheet">
    <style>
        /* 1. Global Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            font-family: 'Shippori Mincho', serif;
            overflow: hidden; /* Prevent scrolling */
        }

        /* ================= INTRO SCREEN ================= */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: flex-end; /* Align to the right */
            align-items: center; /* Center vertically */
            z-index: 10000; /* Ensure it's on top of everything */
            transition: opacity 0.8s ease-out; /* Smooth fade out */
            cursor: pointer;
            overflow: hidden;
        }

        #intro-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            z-index: -1;
            object-fit: cover;
        }

        #intro-overlay {
            position: relative;
            margin-right: 4%; /* Push slightly left from the right edge */
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0; /* Start hidden for fade-in effect */
            transition: opacity 2s ease-in; /* Slow fade in */
        }

        #intro-overlay.visible {
            opacity: 1; /* Fade in state */
        }

        #intro-logo {
            width: 500px; /* Adjust size as needed */
            max-width: 80vw;
            transition: transform 0.3s ease;
        }

        #intro-logo:hover {
            transform: scale(1.05); /* Zoom effect on hover */
        }

        #intro-text {
            font-family: 'Shippori Mincho', serif;
            font-size: 28px;
            color: #ffffff;
            margin-top: 20px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }

        #intro-screen.hidden {
            opacity: 0;
            pointer-events: none; /* Let clicks pass through after fade out */
        }

        /* ================= MAIN CONTENT ================= */
        #main-content {
            position: relative;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in;
            z-index: 1;
        }

        #main-content.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Main Video Background */
        #bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        #main-content.visible #bg-video {
            /* Animation: 0-1s fade in, 1-2.5s hold, 2.5-4.5s drop to 25% */
            animation: videoIntro 4.5s ease-in-out forwards;
        }

        @keyframes videoIntro {
            0% { opacity: 0; }
            22% { opacity: 1; }
            55% { opacity: 1; }
            100% { opacity: 0.25; }
        }

        /* Top Left Vertical Text */
        #vertical-text {
            position: absolute;
            top: 50px;
            left: 50px;
            color: #ffffff;
            font-size: 24px;
            letter-spacing: 6px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            opacity: 0;
            z-index: 10;
        }

        #main-content.visible #vertical-text {
            animation: fadeInText 2s ease-in-out 3s forwards;
        }

        @keyframes fadeInText {
            to { opacity: 1; }
        }

        /* Center Hollow Floating Title */
        #center-title {
            position: absolute;
            left: 50%;
            top: -20%; /* Start above screen */
            transform: translate(-50%, -50%);
            font-size: 5vw;
            font-weight: bold;
            white-space: nowrap;
            color: transparent; /* Hollow effect */
            -webkit-text-stroke: 2px #ffffff; /* White outline */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            opacity: 0;
            z-index: 10;
        }

        #main-content.visible #center-title {
            /* Drop in at 3s, then float infinitely */
            animation: 
                dropIn 1.5s cubic-bezier(0.25, 1, 0.5, 1) 3s forwards,
                floatAnim 4s ease-in-out 4.5s infinite;
        }

        @keyframes dropIn {
            0% { top: -20%; opacity: 0; }
            100% { top: 50%; opacity: 1; }
        }

        @keyframes floatAnim {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -55%); }
        }

        /* Responsive tweaks */
        @media (max-width: 768px) {
            #intro-overlay {
                margin-right: 0;
                justify-content: center;
            }
            #intro-screen {
                justify-content: center;
            }
            #center-title {
                font-size: 6vw;
                white-space: normal;
                text-align: center;
                width: 90%;
            }
            #vertical-text {
                top: 20px;
                left: 20px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ================= INTRO SCREEN ================= -->
    <div id="intro-screen">
        <video autoplay muted loop playsinline id="intro-video">
            <source src="website.mp4" type="video/mp4">
        </video>
        <div id="intro-overlay">
            <img src="mangolotis_white.png" alt="Mangolotis Logo" id="intro-logo">
            <div id="intro-text">Trying to Feel Alive</div>
        </div>
    </div>

    <!-- ================= MAIN CONTENT ================= -->
    <div id="main-content">
        <!-- Center Video -->
        <video id="bg-video" src="mainpreview.mp4" autoplay loop muted playsinline></video>

        <!-- Vertical Text -->
        <div id="vertical-text">MANGOLOTIS</div>

        <!-- Center Hollow Title -->
        <div id="center-title">MY NEW INDIEGAME PROGRESS</div>
    </div>

    <script>
        // --- INTRO & TRANSITION LOGIC ---
        const introScreen = document.getElementById('intro-screen');
        const introOverlay = document.getElementById('intro-overlay');
        const mainContent = document.getElementById('main-content');
        const mainVideo = document.getElementById('bg-video');

        // Fade in logo & text after a slight delay
        setTimeout(() => {
            introOverlay.classList.add('visible');
        }, 800);

        // Click anywhere on intro screen to enter the new indie game page
        introScreen.addEventListener('click', () => {
            introScreen.classList.add('hidden'); // Fade out intro
            
            setTimeout(() => {
                introScreen.style.display = 'none'; // Remove intro from layout
                mainContent.classList.add('visible'); // Fade in main content & trigger animations
                
                // Ensure main video plays from the start when revealed
                mainVideo.currentTime = 0; 
                mainVideo.play();
            }, 800); // Wait for fade out animation
        });
    </script>

</body>
</html>
